<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HandsUp — Escáner de Respuestas</title>
    <link rel="stylesheet" href="css/global.css">
    <link rel="icon"
        href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>✋</text></svg>">
    <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
    <style>
        body {
            background: #000;
            color: var(--white);
            overflow: hidden;
            margin: 0;
            padding: 0;
        }

        .scan-page {
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        .scan-header {
            padding: 12px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(0, 0, 0, 0.8);
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            z-index: 10;
        }

        .scan-brand {
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 800;
            font-size: 1rem;
        }

        .scan-status {
            padding: 4px 10px;
            border-radius: var(--radius-full);
            font-size: 0.75rem;
            font-weight: 600;
        }

        .scan-status.connected {
            background: rgba(16, 185, 129, 0.2);
            color: var(--success);
        }

        .scan-status.waiting {
            background: rgba(245, 158, 11, 0.2);
            color: var(--warning);
        }

        /* Camera Area */
        .camera-container {
            flex: 1;
            position: relative;
            overflow: hidden;
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        #overlayCanvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        .camera-instruction {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            pointer-events: none;
            background: rgba(0, 0, 0, 0.6);
            padding: 16px;
            border-radius: 12px;
            display: none;
        }

        .camera-instruction.visible {
            display: block;
        }

        /* Bottom Results Area */
        .results-area {
            height: 35vh;
            background: var(--gray-900);
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            flex-direction: column;
        }

        .results-header {
            padding: 12px 16px;
            background: rgba(0, 0, 0, 0.2);
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .question-info {
            font-size: 0.85rem;
            color: var(--gray-300);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 70%;
        }

        .scan-count {
            font-size: 0.9rem;
            font-weight: 700;
            color: var(--primary-400);
        }

        .scanned-list {
            flex: 1;
            overflow-y: auto;
            padding: 12px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .scanned-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(255, 255, 255, 0.05);
            padding: 10px 14px;
            border-radius: 8px;
            animation: slideInRight 0.3s ease;
            border-left: 3px solid transparent;
        }

        .scanned-item.a {
            border-left-color: var(--answer-a);
        }

        .scanned-item.b {
            border-left-color: var(--answer-b);
        }

        .scanned-item.c {
            border-left-color: var(--answer-c);
        }

        .scanned-item.d {
            border-left-color: var(--answer-d);
        }

        .scanned-name {
            font-weight: 600;
            font-size: 0.9rem;
        }

        .scanned-answer {
            width: 28px;
            height: 28px;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            font-size: 0.85rem;
            color: white;
        }

        .scanned-answer.A {
            background: var(--answer-a);
        }

        .scanned-answer.B {
            background: var(--answer-b);
        }

        .scanned-answer.C {
            background: var(--answer-c);
        }

        .scanned-answer.D {
            background: var(--answer-d);
        }

        /* Notification overlay */
        .scan-flash {
            position: absolute;
            inset: 0;
            background: var(--success);
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s;
            z-index: 20;
        }

        .scan-flash.active {
            opacity: 0.3;
            transition: opacity 0.05s;
        }
    </style>
</head>

<body>
    <div class="scan-page" id="scanPage">
        <div class="scan-header">
            <div class="scan-brand">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="20" height="20">
                    <path d="M3 7V5a2 2 0 0 1 2-2h2" />
                    <path d="M17 3h2a2 2 0 0 1 2 2v2" />
                    <path d="M21 17v2a2 2 0 0 1-2 2h-2" />
                    <path d="M7 21H5a2 2 0 0 1-2-2v-2" />
                    <rect x="7" y="7" width="10" height="10" />
                </svg>
                Scanner
            </div>
            <div class="scan-status waiting" id="scanStatus">Conectando...</div>
        </div>

        <div class="camera-container">
            <video id="video" playsinline></video>
            <canvas id="overlayCanvas"></canvas>
            <div id="scanFlash" class="scan-flash"></div>
            <div class="camera-instruction" id="cameraInstr">
                Esperando a que el profesor inicie la pregunta...
            </div>
        </div>

        <div class="results-area">
            <div class="results-header">
                <div class="question-info" id="currentQuestionText">Esperando partida...</div>
                <div class="scan-count"><span id="answeredCount">0</span> / <span id="totalStudents">0</span></div>
            </div>
            <div class="scanned-list" id="scannedList">
                <!-- Scanned items appear here -->
            </div>
        </div>
    </div>

    <!-- Hidden canvas for QR processing -->
    <canvas id="hiddenCanvas" style="display:none;"></canvas>

    <script type="module">
        import { db, doc, getDoc, updateDoc, onSnapshot } from './js/firebase-init.js';

        const params = new URLSearchParams(window.location.search);
        const gameId = params.get('game');

        if (!gameId) {
            document.body.innerHTML = '<div style="padding:40px;text-align:center;"><h2>URL inválida</h2><p>Falta el ID del juego</p></div>';
        } else {
            initApp();
        }

        let studentsMap = {}; // id -> name
        let totalStudentsCount = 0;
        let gameData = null;
        let localResponses = {};
        let isQuestionActive = false;

        // Camera vars
        const video = document.getElementById("video");
        const hiddenCanvas = document.getElementById("hiddenCanvas");
        const ctx = hiddenCanvas.getContext("2d", { willReadFrequently: true });
        const overlayCanvas = document.getElementById("overlayCanvas");
        const overlayCtx = overlayCanvas.getContext("2d");

        // Scan throttling to avoid spamming the same QR
        const recentScans = new Map();

        async function initApp() {
            // 1. Listen to game doc
            onSnapshot(doc(db, 'games', gameId), async (snapshot) => {
                if (!snapshot.exists()) return;

                const data = snapshot.data();
                gameData = data;

                const statusEl = document.getElementById('scanStatus');
                const instrEl = document.getElementById('cameraInstr');

                if (data.status === 'lobby') {
                    statusEl.textContent = 'Lobby';
                    statusEl.className = 'scan-status waiting';
                    instrEl.textContent = 'Esperando a que inicie la pregunta...';
                    instrEl.classList.add('visible');
                    isQuestionActive = false;
                } else if (data.status === 'question') {
                    statusEl.textContent = 'Escaneando';
                    statusEl.className = 'scan-status connected';
                    instrEl.classList.remove('visible');
                    isQuestionActive = true;

                    // Load class students if needed
                    if (totalStudentsCount === 0 && data.classId) {
                        const classDoc = await getDoc(doc(db, 'classes', data.classId));
                        if (classDoc.exists()) {
                            const studentsList = classDoc.data().students || [];
                            totalStudentsCount = studentsList.length;
                            document.getElementById('totalStudents').textContent = totalStudentsCount;
                            studentsList.forEach(s => {
                                studentsMap[s.id] = s.name;
                            });
                        }
                    }

                    // Question info
                    if (data.quizId && data.currentQuestion >= 0) {
                        const quizDoc = await getDoc(doc(db, 'quizzes', data.quizId));
                        if (quizDoc.exists()) {
                            const q = quizDoc.data().questions[data.currentQuestion];
                            if (q) {
                                document.getElementById('currentQuestionText').textContent = `P${data.currentQuestion + 1}: ${q.question}`;
                            }
                        }
                    }

                    // Only update list if we have new responses
                    const serverResponses = data.responses || {};
                    let updated = false;
                    for (let id in serverResponses) {
                        if (!localResponses[id] || localResponses[id].answer !== serverResponses[id].answer) {
                            localResponses[id] = serverResponses[id];
                            updated = true;
                        }
                    }
                    if (updated || Object.keys(localResponses).length === 0) {
                        if (Object.keys(localResponses).length === 0) {
                            localResponses = {}; // explicit reset
                        }
                        renderList();
                    }

                } else {
                    statusEl.textContent = 'Pausa';
                    statusEl.className = 'scan-status waiting';
                    instrEl.textContent = 'Pregunta terminada. Mira los resultados en pantalla.';
                    instrEl.classList.add('visible');
                    isQuestionActive = false;
                }
            });

            // 2. Start Camera
            startCamera();
        }

        function startCamera() {
            navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } }).then(function (stream) {
                video.srcObject = stream;
                video.setAttribute("playsinline", true); // required for iOS Safari
                video.play();
                requestAnimationFrame(tick);
            }).catch(err => {
                console.error("Camera error:", err);
                document.getElementById('cameraInstr').textContent = "Error de cámara. Por favor da permisos.";
                document.getElementById('cameraInstr').classList.add('visible');
            });
        }

        function tick() {
            if (video.readyState === video.HAVE_ENOUGH_DATA) {
                // Set canvas sizes
                hiddenCanvas.width = video.videoWidth;
                hiddenCanvas.height = video.videoHeight;
                overlayCanvas.width = video.clientWidth;
                overlayCanvas.height = video.clientHeight;

                // Draw video frame to hidden canvas for processing
                ctx.drawImage(video, 0, 0, hiddenCanvas.width, hiddenCanvas.height);

                if (isQuestionActive) {
                    const imageData = ctx.getImageData(0, 0, hiddenCanvas.width, hiddenCanvas.height);
                    const code = jsQR(imageData.data, imageData.width, imageData.height, {
                        inversionAttempts: "dontInvert",
                    });

                    if (code) {
                        processDetectedCode(code);
                    }
                }
            }
            requestAnimationFrame(tick);
        }

        function processDetectedCode(code) {
            try {
                // Parse student data from QR
                const data = JSON.parse(code.data);
                const studentId = data.id;

                if (!studentId || !studentsMap[studentId]) return;

                // Determine rotation/orientation
                const tl = code.location.topLeftCorner;
                const tr = code.location.topRightCorner;

                const dx = tr.x - tl.x;
                const dy = tr.y - tl.y;
                let angle = Math.atan2(dy, dx) * 180 / Math.PI;
                if (angle < 0) angle += 360;

                // Map angle to A/B/C/D
                let answer = '';
                if (angle >= 315 || angle < 45) answer = 'A';       // Upright ~ 0 deg
                else if (angle >= 45 && angle < 135) answer = 'D';  // Rotated 90 CW
                else if (angle >= 135 && angle < 225) answer = 'C'; // Rotated 180
                else if (angle >= 225 && angle < 315) answer = 'B'; // Rotated 270 CW

                // Check if we should ignore (throttle to avoid spamming network)
                const now = Date.now();
                const lastScan = recentScans.get(studentId);
                if (lastScan && now - lastScan.time < 2000 && lastScan.ans === answer) {
                    return; // Same answer recently scanned, ignore
                }

                // Draw detection box temporarily
                drawBox(code.location, answer);

                // Check if different from current local state
                if (!localResponses[studentId] || localResponses[studentId].answer !== answer) {
                    // Update state
                    localResponses[studentId] = { answer, timestamp: now };
                    recentScans.set(studentId, { time: now, ans: answer });

                    // Visual feedback
                    flashScreen();
                    renderList();

                    // Sync to Firebase
                    updateDoc(doc(db, 'games', gameId), {
                        [`responses.${studentId}`]: { answer, timestamp: now }
                    }).catch(console.error);
                }

            } catch (e) {
                // Not our JSON format or some other error, ignore
            }
        }

        function drawBox(loc, label) {
            // Convert video coordinates to CSS coordinates
            const ratioX = overlayCanvas.width / video.videoWidth;
            const ratioY = overlayCanvas.height / video.videoHeight;

            overlayCtx.clearRect(0, 0, overlayCanvas.width, overlayCanvas.height);

            overlayCtx.beginPath();
            overlayCtx.moveTo(loc.topLeftCorner.x * ratioX, loc.topLeftCorner.y * ratioY);
            overlayCtx.lineTo(loc.topRightCorner.x * ratioX, loc.topRightCorner.y * ratioY);
            overlayCtx.lineTo(loc.bottomRightCorner.x * ratioX, loc.bottomRightCorner.y * ratioY);
            overlayCtx.lineTo(loc.bottomLeftCorner.x * ratioX, loc.bottomLeftCorner.y * ratioY);
            overlayCtx.closePath();

            // Neon green box
            overlayCtx.lineWidth = 4;
            overlayCtx.strokeStyle = "#10B981";
            overlayCtx.stroke();

            // Draw label
            overlayCtx.fillStyle = "#10B981";
            overlayCtx.font = "bold 24px sans-serif";
            overlayCtx.fillText(label, loc.topLeftCorner.x * ratioX, loc.topLeftCorner.y * ratioY - 10);

            // Clear after 300ms
            setTimeout(() => {
                overlayCtx.clearRect(0, 0, overlayCanvas.width, overlayCanvas.height);
            }, 300);
        }

        function flashScreen() {
            const flash = document.getElementById('scanFlash');
            flash.classList.add('active');
            setTimeout(() => flash.classList.remove('active'), 100);

            // Vibrate if supported
            if (navigator.vibrate) navigator.vibrate(50);
        }

        function renderList() {
            const listEl = document.getElementById('scannedList');

            // Sort responses: newest first
            const entries = Object.entries(localResponses)
                .map(([id, data]) => ({ id, ...data }))
                .sort((a, b) => b.timestamp - a.timestamp);

            document.getElementById('answeredCount').textContent = entries.length;

            listEl.innerHTML = entries.map(e => `
                <div class="scanned-item ${e.answer.toLowerCase()}">
                    <div class="scanned-name">${studentsMap[e.id] || 'Alumno'}</div>
                    <div class="scanned-answer ${e.answer}">${e.answer}</div>
                </div>
            `).join('');
        }
    </script>
</body>

</html>
