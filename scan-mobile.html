<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HandsUp — Escáner</title>
    <link rel="stylesheet" href="css/global.css">
    <link rel="icon"
        href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>✋</text></svg>">
    <style>
        body {
            background: var(--gray-900);
            color: var(--white);
            overflow: hidden;
        }

        .scan-page {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .scan-header {
            padding: 16px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(0, 0, 0, 0.3);
        }

        .scan-brand {
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 800;
            font-size: 1.1rem;
        }

        .scan-brand svg {
            width: 24px;
            height: 24px;
            color: var(--primary-400);
        }

        .scan-status {
            padding: 6px 14px;
            border-radius: var(--radius-full);
            font-size: 0.8rem;
            font-weight: 600;
        }

        .scan-status.connected {
            background: rgba(16, 185, 129, 0.2);
            color: var(--success);
        }

        .scan-status.waiting {
            background: rgba(245, 158, 11, 0.2);
            color: var(--warning);
        }

        /* Manual Answer Grid */
        .manual-grid {
            display: flex;
            flex-direction: column;
            flex: 1;
            overflow-y: auto;
            padding: 16px;
        }

        .manual-info {
            text-align: center;
            padding: 12px;
            margin-bottom: 16px;
        }

        .manual-question-text {
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--white);
            margin-bottom: 4px;
        }

        .manual-question-sub {
            font-size: 0.8rem;
            color: var(--gray-400);
        }

        .student-answer-grid {
            display: flex;
            flex-direction: column;
            gap: 8px;
            flex: 1;
            overflow-y: auto;
            padding-bottom: 80px;
        }

        .student-answer-row {
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: var(--radius-md);
            padding: 8px 12px;
            transition: all var(--transition-fast);
        }

        .student-answer-row.answered {
            border-color: var(--success);
            background: rgba(16, 185, 129, 0.08);
        }

        .student-answer-name {
            flex: 1;
            font-weight: 600;
            font-size: 0.9rem;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .answer-buttons {
            display: flex;
            gap: 4px;
        }

        .answer-btn {
            width: 40px;
            height: 40px;
            border: none;
            border-radius: var(--radius-sm);
            font-weight: 800;
            font-size: 0.9rem;
            color: var(--white);
            cursor: pointer;
            opacity: 0.4;
            transition: all var(--transition-fast);
        }

        .answer-btn:hover {
            opacity: 0.8;
            transform: scale(1.1);
        }

        .answer-btn.selected {
            opacity: 1;
            transform: scale(1.15);
            box-shadow: 0 0 12px rgba(255, 255, 255, 0.3);
        }

        .answer-btn.a {
            background: var(--answer-a);
        }

        .answer-btn.b {
            background: var(--answer-b);
        }

        .answer-btn.c {
            background: var(--answer-c);
        }

        .answer-btn.d {
            background: var(--answer-d);
        }

        /* Bottom bar */
        .scan-bottom {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(15, 23, 42, 0.95);
            backdrop-filter: blur(20px);
            padding: 16px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        .scan-count {
            font-size: 0.9rem;
            color: var(--gray-400);
        }

        .scan-count span {
            color: var(--primary-400);
            font-weight: 700;
        }

        /* No game state */
        .no-game {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 40px;
            text-align: center;
        }

        .no-game svg {
            width: 64px;
            height: 64px;
            color: var(--gray-500);
            margin-bottom: 20px;
        }

        .no-game h3 {
            color: var(--white);
            margin-bottom: 8px;
        }

        .no-game p {
            color: var(--gray-400);
        }

        /* Select All row */
        .select-all-row {
            display: flex;
            gap: 4px;
            justify-content: flex-end;
            margin-bottom: 12px;
            padding: 8px 12px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: var(--radius-md);
        }

        .select-all-btn {
            padding: 8px 16px;
            border-radius: var(--radius-sm);
            border: 1px solid rgba(255, 255, 255, 0.15);
            background: transparent;
            color: var(--gray-400);
            font-weight: 600;
            font-size: 0.8rem;
            cursor: pointer;
            transition: all var(--transition-fast);
        }

        .select-all-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            color: var(--white);
        }
    </style>
</head>

<body>
    <div class="scan-page" id="scanPage">
        <div class="scan-header">
            <div class="scan-brand">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                    stroke-linejoin="round">
                    <path d="M18 11V6a2 2 0 0 0-2-2v0a2 2 0 0 0-2 2v0" />
                    <path d="M14 10V4a2 2 0 0 0-2-2v0a2 2 0 0 0-2 2v2" />
                    <path d="M10 10.5V6a2 2 0 0 0-2-2v0a2 2 0 0 0-2 2v8" />
                    <path
                        d="M18 8a2 2 0 1 1 4 0v6a8 8 0 0 1-8 8h-2c-2.8 0-4.5-.86-5.99-2.34l-3.6-3.6a2 2 0 0 1 2.83-2.82L7 13" />
                </svg>
                HandsUp Scanner
            </div>
            <div class="scan-status waiting" id="scanStatus">Conectando...</div>
        </div>

        <div class="manual-grid" id="manualGrid">
            <div class="manual-info">
                <div class="manual-question-text" id="currentQuestionText">Esperando pregunta...</div>
                <div class="manual-question-sub" id="currentQuestionSub">Toca el botón de respuesta para cada alumno al
                    escanear su código</div>
            </div>

            <div class="student-answer-grid" id="studentAnswerGrid">
                <!-- Student rows loaded here -->
            </div>
        </div>

        <div class="scan-bottom">
            <div class="scan-count">
                <span id="answeredCount">0</span> / <span id="totalStudents">0</span> respondidos
            </div>
        </div>
    </div>

    <div class="no-game" id="noGameScreen" style="display:none">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M3 7V5a2 2 0 0 1 2-2h2" />
            <path d="M17 3h2a2 2 0 0 1 2 2v2" />
            <path d="M21 17v2a2 2 0 0 1-2 2h-2" />
            <path d="M7 21H5a2 2 0 0 1-2-2v-2" />
            <rect x="7" y="7" width="10" height="10" />
        </svg>
        <h3>Sin partida activa</h3>
        <p>Abre este enlace desde la pantalla del juego</p>
    </div>

    <script type="module">
        import { db, doc, getDoc, updateDoc, onSnapshot } from './js/firebase-init.js';

        const params = new URLSearchParams(window.location.search);
        const gameId = params.get('game');

        if (!gameId) {
            document.getElementById('scanPage').style.display = 'none';
            document.getElementById('noGameScreen').style.display = 'flex';
        } else {
            initScanner();
        }

        let students = [];
        let gameData = null;
        let localResponses = {};

        async function initScanner() {
            // Listen to game document for real-time updates
            onSnapshot(doc(db, 'games', gameId), async (snapshot) => {
                if (!snapshot.exists()) return;

                const data = snapshot.data();
                gameData = data;

                const statusEl = document.getElementById('scanStatus');

                if (data.status === 'lobby') {
                    statusEl.textContent = 'En lobby';
                    statusEl.className = 'scan-status waiting';
                    document.getElementById('currentQuestionText').textContent = 'Esperando que empiece la partida...';
                } else if (data.status === 'question') {
                    statusEl.textContent = 'En vivo';
                    statusEl.className = 'scan-status connected';

                    // Load class to get students
                    if (students.length === 0 && data.classId) {
                        const classDoc = await getDoc(doc(db, 'classes', data.classId));
                        if (classDoc.exists()) {
                            students = classDoc.data().students || [];
                            document.getElementById('totalStudents').textContent = students.length;
                        }
                    }

                    // Load quiz to get current question text
                    if (data.quizId && data.currentQuestion >= 0) {
                        const quizDoc = await getDoc(doc(db, 'quizzes', data.quizId));
                        if (quizDoc.exists()) {
                            const quiz = quizDoc.data();
                            const q = quiz.questions[data.currentQuestion];
                            if (q) {
                                document.getElementById('currentQuestionText').textContent =
                                    `P${data.currentQuestion + 1}: ${q.question}`;
                                document.getElementById('currentQuestionSub').textContent =
                                    `${q.options[0]} | ${q.options[1]} | ${q.options[2]} | ${q.options[3]}`;
                            }
                        }
                    }

                    // Reset responses for new question
                    localResponses = data.responses || {};
                    renderStudentGrid();
                } else if (data.status === 'results' || data.status === 'finished') {
                    statusEl.textContent = data.status === 'finished' ? 'Finalizado' : 'Resultados';
                    statusEl.className = 'scan-status waiting';
                }
            });
        }

        function renderStudentGrid() {
            const grid = document.getElementById('studentAnswerGrid');
            const labels = ['A', 'B', 'C', 'D'];
            const classes = ['a', 'b', 'c', 'd'];

            grid.innerHTML = students.map(s => {
                const answered = localResponses[s.id];
                const selectedAnswer = answered ? answered.answer : null;

                return `
          <div class="student-answer-row ${answered ? 'answered' : ''}" id="row-${s.id}">
            <div class="student-answer-name">${s.name}</div>
            <div class="answer-buttons">
              ${labels.map((l, i) => `
                <button class="answer-btn ${classes[i]} ${selectedAnswer === l ? 'selected' : ''}" 
                        onclick="selectAnswer('${s.id}', '${l}', this)">
                  ${l}
                </button>
              `).join('')}
            </div>
          </div>
        `;
            }).join('');

            updateCount();
        }

        window.selectAnswer = async (studentId, answer, btnEl) => {
            // Toggle if same answer clicked
            if (localResponses[studentId] && localResponses[studentId].answer === answer) {
                delete localResponses[studentId];
            } else {
                localResponses[studentId] = { answer, timestamp: Date.now() };
            }

            // Update UI immediately
            const row = document.getElementById(`row-${studentId}`);
            if (row) {
                const buttons = row.querySelectorAll('.answer-btn');
                buttons.forEach(btn => btn.classList.remove('selected'));

                if (localResponses[studentId]) {
                    btnEl.classList.add('selected');
                    row.classList.add('answered');
                } else {
                    row.classList.remove('answered');
                }
            }

            updateCount();

            // Sync to Firestore
            try {
                await updateDoc(doc(db, 'games', gameId), {
                    [`responses.${studentId}`]: localResponses[studentId] || null
                });
            } catch (e) {
                console.error('Error syncing response:', e);
            }
        };

        function updateCount() {
            const count = Object.keys(localResponses).length;
            document.getElementById('answeredCount').textContent = count;
        }
    </script>
</body>

</html>
