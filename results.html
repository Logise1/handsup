<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resultados — HandsUp</title>
    <link rel="stylesheet" href="css/common.css">
    <link rel="stylesheet" href="css/dashboard.css">
    <link rel="stylesheet" href="css/results.css">
    <link rel="icon"
        href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>✋</text></svg>">
</head>

<body>
    <div class="dashboard-layout">
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <a href="dashboard.html" class="sidebar-brand">
                    <div class="logo-icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white"
                            stroke-width="2.5">
                            <path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z" />
                            <polyline points="14 2 14 8 20 8" />
                        </svg></div>
                    Hands<span style="color:var(--primary)">Up</span>
                </a>
            </div>
            <nav class="sidebar-nav">
                <span class="sidebar-section-title">Principal</span>
                <a href="dashboard.html" class="sidebar-link"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"
                        stroke-width="2">
                        <rect x="3" y="3" width="7" height="7" />
                        <rect x="14" y="3" width="7" height="7" />
                        <rect x="3" y="14" width="7" height="7" />
                        <rect x="14" y="14" width="7" height="7" />
                    </svg><span>Dashboard</span></a>
                <a href="create-exam.html" class="sidebar-link"><svg viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2">
                        <line x1="12" y1="5" x2="12" y2="19" />
                        <line x1="5" y1="12" x2="19" y2="12" />
                    </svg><span>Crear examen</span></a>
                <a href="scan.html" class="sidebar-link"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"
                        stroke-width="2">
                        <path d="M23 19a2 2 0 01-2 2H3a2 2 0 01-2-2V8a2 2 0 012-2h4l2-3h6l2 3h4a2 2 0 012 2z" />
                        <circle cx="12" cy="13" r="4" />
                    </svg><span>Escanear</span></a>
                <span class="sidebar-section-title">Gestión</span>
                <a href="classes.html" class="sidebar-link"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"
                        stroke-width="2">
                        <path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2" />
                        <circle cx="9" cy="7" r="4" />
                    </svg><span>Clases</span></a>
                <a href="results.html" class="sidebar-link active"><svg viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2">
                        <line x1="18" y1="20" x2="18" y2="10" />
                        <line x1="12" y1="20" x2="12" y2="4" />
                        <line x1="6" y1="20" x2="6" y2="14" />
                    </svg><span>Resultados</span></a>
            </nav>
            <div class="sidebar-footer">
                <div class="sidebar-user" onclick="Auth.signOut()">
                    <div class="sidebar-user-avatar" id="user-avatar">U</div>
                    <div class="sidebar-user-info">
                        <div class="sidebar-user-name" id="user-name">Usuario</div>
                        <div class="sidebar-user-email">Cerrar sesión</div>
                    </div>
                </div>
            </div>
        </aside>
        <div class="sidebar-overlay" id="sidebar-overlay" onclick="toggleSidebar()"></div>

        <main class="main-content">
            <header class="main-header">
                <div class="flex items-center gap-3">
                    <button class="sidebar-toggle" onclick="toggleSidebar()"><svg width="22" height="22"
                            viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <line x1="3" y1="12" x2="21" y2="12" />
                            <line x1="3" y1="6" x2="21" y2="6" />
                            <line x1="3" y1="18" x2="21" y2="18" />
                        </svg></button>
                    <h1>Resultados</h1>
                </div>
            </header>

            <div class="main-body">
                <!-- Filters -->
                <div class="results-filters">
                    <select class="input" id="filter-class">
                        <option value="">Todas las clases</option>
                    </select>
                    <select class="input" id="filter-exam">
                        <option value="">Todos los exámenes</option>
                    </select>
                </div>

                <!-- Summary Cards -->
                <div class="results-summary animate-fade-in-up">
                    <div class="results-summary-card">
                        <div class="value" id="summary-students">0</div>
                        <div class="label">Alumnos evaluados</div>
                    </div>
                    <div class="results-summary-card">
                        <div class="value" id="summary-exams">0</div>
                        <div class="label">Exámenes corregidos</div>
                    </div>
                    <div class="results-summary-card highlight">
                        <div class="value" id="summary-avg">-</div>
                        <div class="label">Nota media</div>
                    </div>
                    <div class="results-summary-card">
                        <div class="value" id="summary-pass">-</div>
                        <div class="label">Tasa de aprobados</div>
                    </div>
                </div>

                <!-- Results Table -->
                <div class="table-container animate-fade-in-up animate-delay-2">
                    <table>
                        <thead>
                            <tr>
                                <th>Alumno</th>
                                <th>Examen</th>
                                <th>Correctas</th>
                                <th>Incorrectas</th>
                                <th>Total</th>
                                <th>Nota</th>
                                <th>Fecha</th>
                            </tr>
                        </thead>
                        <tbody id="results-tbody">
                            <tr>
                                <td colspan="7" style="text-align:center;padding:40px;color:var(--text-secondary)">
                                    Cargando resultados...</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="js/firebase-config.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/results.js"></script>
    <script>
        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('open');
            document.getElementById('sidebar-overlay').classList.toggle('active');
        }
        auth.onAuthStateChanged(user => {
            if (!user) { window.location.href = 'index.html'; return; }
            document.getElementById('user-name').textContent = Auth.getDisplayName();
            document.getElementById('user-avatar').textContent = Auth.getDisplayName().charAt(0).toUpperCase();
            Results.init();
        });
    </script>
</body>

</html>
