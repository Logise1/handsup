<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HandsUp — Mis Quizzes</title>
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/dashboard.css">
    <link rel="icon"
        href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>✋</text></svg>">
</head>

<body>
    <div id="navContainer"></div>

    <div class="app-layout">
        <aside class="sidebar">
            <div class="sidebar-section">
                <div class="sidebar-title">Principal</div>
                <a href="dashboard.html" class="sidebar-link">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                        stroke-linejoin="round" width="20" height="20">
                        <path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z" />
                        <polyline points="9 22 9 12 15 12 15 22" />
                    </svg>
                    Dashboard
                </a>
                <a href="my-classes.html" class="sidebar-link">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                        stroke-linejoin="round" width="20" height="20">
                        <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2" />
                        <circle cx="9" cy="7" r="4" />
                    </svg>
                    Mis Clases
                </a>
                <a href="my-quizzes.html" class="sidebar-link active">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                        stroke-linejoin="round" width="20" height="20">
                        <path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z" />
                        <polyline points="14 2 14 8 20 8" />
                    </svg>
                    Mis Quizzes
                </a>
            </div>
            <div class="sidebar-section">
                <div class="sidebar-title">Acciones</div>
                <a href="create-quiz.html" class="sidebar-link">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                        stroke-linejoin="round" width="20" height="20">
                        <path
                            d="M12 2a4 4 0 0 0-4 4v2H6a2 2 0 0 0-2 2v10a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V10a2 2 0 0 0-2-2h-2V6a4 4 0 0 0-4-4z" />
                        <circle cx="9" cy="14" r="1" />
                        <circle cx="15" cy="14" r="1" />
                        <path d="M9 18h6" />
                    </svg>
                    Crear Quiz con IA
                </a>
            </div>
        </aside>

        <main class="main-content">
            <div class="page-header">
                <div>
                    <h1 class="page-title">Mis Quizzes</h1>
                    <p class="page-subtitle">Todos tus quizzes creados</p>
                </div>
                <a href="create-quiz.html" class="btn btn-primary">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18">
                        <line x1="12" y1="5" x2="12" y2="19" />
                        <line x1="5" y1="12" x2="19" y2="12" />
                    </svg>
                    Nuevo Quiz
                </a>
            </div>

            <div class="cards-grid stagger" id="quizzesGrid">
                <!-- Quizzes loaded here -->
            </div>
        </main>
    </div>

    <!-- Play Modal - Select class -->
    <div class="modal-overlay" id="playModal">
        <div class="modal">
            <div class="modal-header">
                <h3 class="modal-title">Seleccionar Clase</h3>
                <button class="modal-close" onclick="closeModal('playModal')">✕</button>
            </div>
            <p style="font-size:0.9rem;color:var(--gray-500);margin-bottom:16px">Elige la clase que participará en este
                quiz</p>
            <div id="classSelectList">
                <!-- Classes loaded here -->
            </div>
        </div>
    </div>

    <script type="module">
        import { auth, db, onAuthStateChanged, signOut, collection, getDocs, deleteDoc, doc, query, where } from './js/firebase-init.js';
        import { getNavbarHTML, showToast, icons } from './js/utils.js';

        document.getElementById('navContainer').innerHTML = getNavbarHTML('quizzes');

        window.handleLogout = async () => {
            await signOut(auth);
            window.location.href = 'login.html';
        };

        let currentUser = null;
        let selectedQuizId = null;

        onAuthStateChanged(auth, async (user) => {
            if (!user) return window.location.href = 'login.html';
            currentUser = user;
            await loadQuizzes();
        });

        async function loadQuizzes() {
            const snap = await getDocs(query(collection(db, 'quizzes'), where('teacherId', '==', currentUser.uid)));
            const quizzes = [];
            snap.forEach(d => quizzes.push({ id: d.id, ...d.data() }));
            quizzes.sort((a, b) => (b.createdAt?.seconds || 0) - (a.createdAt?.seconds || 0));

            const grid = document.getElementById('quizzesGrid');

            if (quizzes.length === 0) {
                grid.innerHTML = `
          <div class="empty-state" style="grid-column:1/-1">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" width="60" height="60"><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/><polyline points="14 2 14 8 20 8"/></svg>
            <h3>No tienes quizzes</h3>
            <p>Crea tu primer quiz con IA</p>
            <a href="create-quiz.html" class="btn btn-primary">Crear Quiz</a>
          </div>
        `;
                return;
            }

            grid.innerHTML = quizzes.map(q => `
        <div class="quiz-card">
          <div class="quiz-card-top">
            <h4 class="quiz-card-title">${q.title || 'Sin título'}</h4>
            <span class="badge badge-primary">${(q.questions || []).length} preguntas</span>
          </div>
          <div class="quiz-card-meta">
            <span>${icons.clock} ${q.timePerQuestion || 20}s</span>
          </div>
          <div class="quiz-card-actions">
            <button class="btn btn-primary btn-sm" onclick="playQuiz('${q.id}')">
              ${icons.play} Jugar
            </button>
            <a href="create-quiz.html?edit=${q.id}" class="btn btn-secondary btn-sm">
              ${icons.edit} Editar
            </a>
            <button class="btn btn-ghost btn-sm" onclick="deleteQuiz('${q.id}')" style="color:var(--error)">
              ${icons.trash}
            </button>
          </div>
        </div>
      `).join('');
        }

        window.playQuiz = async (quizId) => {
            selectedQuizId = quizId;

            // Load classes for selection
            const snap = await getDocs(query(collection(db, 'classes'), where('teacherId', '==', currentUser.uid)));
            const classes = [];
            snap.forEach(d => classes.push({ id: d.id, ...d.data() }));

            if (classes.length === 0) {
                showToast('Primero crea una clase con alumnos', 'warning');
                return;
            }

            const container = document.getElementById('classSelectList');
            container.innerHTML = classes.map(c => `
        <div class="quick-action" onclick="startGame('${c.id}')" style="margin-bottom:8px">
          ${icons.users}
          <div>
            <div style="font-weight:600">${c.name}</div>
            <div style="font-size:0.8rem;color:var(--gray-400)">${(c.students || []).length} alumnos</div>
          </div>
        </div>
      `).join('');

            document.getElementById('playModal').classList.add('active');
        };

        window.startGame = (classId) => {
            window.location.href = `game-host.html?quiz=${selectedQuizId}&class=${classId}`;
        };

        window.deleteQuiz = async (quizId) => {
            if (!confirm('¿Eliminar este quiz?')) return;
            await deleteDoc(doc(db, 'quizzes', quizId));
            showToast('Quiz eliminado', 'success');
            await loadQuizzes();
        };

        window.closeModal = (id) => {
            document.getElementById(id).classList.remove('active');
        };

        document.querySelectorAll('.modal-overlay').forEach(overlay => {
            overlay.addEventListener('click', (e) => {
                if (e.target === overlay) overlay.classList.remove('active');
            });
        });
    </script>
</body>

</html>
